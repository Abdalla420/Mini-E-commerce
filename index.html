    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mini E-commerce</title>
        <link rel="stylesheet" href="./style.css">
        <script type="module" src="./script.js" defer></script>
    </head>
    <body>
        <header>
            <div id="container">
                <h1 id="title">My Store</h1>
                <form action="#" method="get" id="myForm">
                    <div id="upper-part">
                        <div id="search">
                            <label for="text-box"></label>
                                <input type="text" name="text-box"id="text-box" placeholder="Search for products...">
                            </label>
                        </div>
                        <div id="category">
                            <label for="categorySelector"></label>
                            <select name="category" id="categorySelector">
                                <option value="all-categories">All Categories</option>
                            </select>
                        </div>
                        <div id="minPriceDiv">
                            <label for="min-price"></label>
                            <input type="number" name="min-price" id="min-price" placeholder="Min Price" min="0">
                        </div>
                        <div id="maxPriceDiv">
                            <label for="max-price"></label>
                            <input type="number" name="max-price" id="max-price" placeholder="Max Price" min="0">
                        </div>
                        <div id="filterButtonDiv">
                            <button type="button" id="filter-button">Apply Filters</button>
                        </div>
                    </div>
                    <div id="sortDiv">
                        <label for="sort">
                            <select name="sort" id="sort">
                                <option value="sort-price">Sort by Price</option>
                                <option value="sort-name">Sort by Name</option>
                                <option value="sort-rating">Sort by Ratings</option>
                            </select>
                        </label>
                    </div>
                </form>
                <div id="shopping">
                    <p>Shopping Cart</p>
                    <ul id="cartList"></ul>
                    <p id="totalQuantity"></p>
                    <p id="totalPrice"></p>
                </div>
            </div>
        </header>
        <footer>
            <div id="gridContainer">
            </div>
            <dialog id="dialog">
                <div id="imgDetDiv">
                    <button id="exitDet" type="button">x</button>
                </div>
                <img id="imgDet" src="" alt="" srcset="">
                <h2 id="titleDet"></h2>
                <p id="descDet"></p>
                <p id="categoryDet"></p>
                <p id="priceDet"></p>
                <p id="ratingDet"></p>
            </dialog>
            <div id="pagesContainer"></div>
        </footer>
    </body>
    </html>
